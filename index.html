<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dispositivo bloqueado</title>

  <style>
    :root {
      --bg: #002233;
      --text: #ffffff;
      --muted: #cfd9e0;
      --link: #00dbff;
      --font: "Verdana", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 32px 16px;
      overflow-x: hidden;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 600px;
    }

    .main-image {
      width: 342px;
      height: 218px;
      object-fit: contain;
    }

    h1 {
      font-size: 22px;
      margin-top: 8px;
    }

    p.description {
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .contacts {
      font-size: 14px;
      margin-top: 12px;
      line-height: 1.6;
    }

    .contacts a {
      color: var(--link);
      text-decoration: none;
    }

    .contacts a:hover {
      text-decoration: underline;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 40px;
      width: 100%;
      max-width: 450px;
      justify-content: center;
      align-items: center;
    }

    .grid-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .grid-item img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    .grid-item a {
        text-decoration: none;
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
    }

    .grid-item span {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    footer {
      margin-top: 48px; /* espaço abaixo do grid */
    }

    footer img {
      width: 120px;
      height: auto;
      opacity: 0.9;
    }

    @media (max-width: 480px) {
      body {
        overflow-x: hidden;
      }

      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        max-width: 340px;
      }

      .grid-item img {
        width: 50px;
        height: 50px;
      }

      h1 {
        font-size: 20px;
      }

      p.description {
        font-size: 14px;
      }
    }
 
  </style>

        footerImage = [],
		    apps = [],
        scripts = [],
		    customDataArr = [];

        function generateApps() {
            appsPlaceHolder.forEach(function(app, e) {
                if (app === "" || app === null || app.includes("<MC")) return;


                if (typeof app !== "undefined") {
                    var appImage = imagesPlaceHolder[e] !== "" ? imagesPlaceHolder[e] : imagesPlaceHolderExe[e] !== "null.png" ? imagesPlaceHolderExe[e] : backupIcon;
                    var linkHolder = linksPlaceHolder[e],
                    displayName = app;

                    if (displayName.toLowerCase().startsWith("background")) {
                        backgroundImage.push({ image: appImage });
                    } else if (displayName.toLowerCase().startsWith("logo")) {
                        logoImage.push({ link: linkHolder, image: appImage });
                    } else if (displayName.toLowerCase().startsWith("footer")) {
                        footerImage.push({ link: linkHolder, image: appImage });
                    } else if (displayName.startsWith("MCScript")) {
                        var disName = displayName.replace("MCScript", "");
                        scripts.push({ name: disName, link: linkHolder});
                    } else if (displayName !== null && displayName !== "" && !displayName.includes("MCDisp")) {
                        apps.push({ name: displayName, link: linkHolder, image: appImage });
                    }
                }
            });

            RenderApps();
        }

        function RenderApps() {
            // Rendering Home screen items to grid.
            const grid = document.getElementById('grid');
            grid.innerHTML = apps.map(item => `
                        <div class="grid-item">
                            <a href="${item.link}">
                            <img src="${item.image}" alt="${item.name}">
                            <span>${item.name}</span>
                            </a>
                        </div>
                    `).join('');
        }

        document.addEventListener("DOMContentLoaded", function() {
            generateApps();
        });
